<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - USSC Finance Forum</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <!-- Authentication Screen -->
    <div class="max-w-md w-full bg-white rounded shadow border border-[#dee0e1] p-6 sm:p-8 m-4">
        <h2 class="text-3xl sm:text-4xl font-bold text-center mb-2 text-blue-800 font-serif tracking-tight">USSC Finance</h2>
        <h3 class="text-xl font-medium text-center mb-6 text-gray-600">Create a new account</h3>
        <div id="auth-error" class="text-red-500 text-sm mb-4 text-center hidden"></div>
        <form id="signup-form" class="space-y-4">
            <input type="text" id="name" placeholder="Full Name" required class="w-full p-3 rounded bg-gray-100 focus:outline-blue-500" />
            <input type="email" id="email" placeholder="Work Email" required class="w-full p-3 rounded bg-gray-100 focus:outline-blue-500" />
            <input type="password" id="password" placeholder="Password" required class="w-full p-3 rounded bg-gray-100 focus:outline-blue-500" />
            <button type="submit" id="auth-btn" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 font-semibold">
                Sign Up
            </button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-500">
            <span>Already have an account?</span> 
            <a href="signin.html" class="text-blue-600 hover:underline font-semibold ml-1">Sign In</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB49W61ggHHJcAJ5WyYTmX13I8NofsggSY",
            authDomain: "olympiad-portal-d2a5e.firebaseapp.com",
            projectId: "olympiad-portal-d2a5e",
            storageBucket: "olympiad-portal-d2a5e.firebasestorage.app",
            messagingSenderId: "341855557503",
            appId: "1:341855557503:web:86333350b609138cb0ec4a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'index.html';
        });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            document.getElementById('auth-error').classList.add('hidden');
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: name });
                await setDoc(doc(db, 'forum_users', userCredential.user.uid), {
                    email: email, name: name, isAdmin: email === 'madhhu52@gmail.com', isDisabled: false, isDeleted: false
                });
                // Re-direction triggered automatically via AuthState observer
            } catch (error) {
                document.getElementById('auth-error').innerText = error.message;
                document.getElementById('auth-error').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
