<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - USSC Finance Forum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#F1F2F2] text-[#282829]">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-200 px-4 py-3 flex items-center justify-center shadow-sm">
        <div class="max-w-7xl w-full flex items-center justify-between">
            <div class="flex items-center">
                <a href="index.html" class="text-2xl font-bold text-blue-700 font-serif tracking-tight hover:opacity-80 transition-opacity">USSC Finance</a>
            </div>
            <div class="flex items-center gap-1 sm:gap-2">
                <a href="index.html" class="flex items-center gap-1.5 px-3 py-2 text-gray-600 hover:bg-gray-100 hover:text-blue-700 rounded transition-colors font-medium text-sm" title="Home">
                    <svg class="w-5 h-5 pointer-events-none" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L4 9v12h5v-7h6v7h5V9z"/></svg>
                    <span class="hidden sm:inline">Home</span>
                </a>
                <a href="post.html" class="flex items-center gap-1.5 px-3 py-2 text-blue-700 bg-blue-50 rounded transition-colors font-medium text-sm" title="Make Post">
                    <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    <span class="hidden sm:inline">Make Post</span>
                </a>
                <a href="index.html" class="flex items-center gap-2 px-3 py-1.5 text-gray-600 hover:bg-gray-100 hover:text-blue-700 rounded-full transition-colors font-medium text-sm border border-transparent hover:border-gray-200" title="Profile">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span id="user-display" class="hidden sm:inline max-w-[120px] truncate"></span>
                </a>
                <a href="admin.html" id="nav-admin" class="hidden flex items-center gap-2 px-3 py-1.5 text-purple-600 bg-purple-50 hover:bg-purple-100 rounded-full transition-colors font-medium text-sm border border-transparent" title="Admin">
                    <svg class="w-5 h-5 pointer-events-none" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                    <span class="hidden sm:inline">Admin</span>
                </a>
                <button id="logout-btn" class="text-sm px-4 py-1.5 border border-gray-300 rounded-full text-gray-500 hover:bg-gray-100 hover:text-gray-800 font-medium transition-colors">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Create Post View -->
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white p-6 rounded shadow border border-[#dee0e1]">
            <h2 class="text-2xl font-bold mb-4 text-gray-900">Create a New Post</h2>
            <form id="create-post-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Title <span class="text-red-500">*</span></label>
                    <input type="text" id="post-title" required class="w-full p-2.5 border border-[#dee0e1] rounded focus:outline-blue-500" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Category <span class="text-red-500">*</span></label>
                    <select id="post-category" required class="w-full p-2.5 border border-[#dee0e1] rounded focus:outline-blue-500 bg-white">
                        <option value="">Select a category</option>
                        <option value="Delegation of Power">Delegation of Power</option>
                        <option value="DSR">DSR</option>
                        <option value="Estimate Vetting">Estimate Vetting</option>
                        <option value="Budget Certification">Budget Certification</option>
                        <option value="GCC Clause">GCC Clause</option>
                        <option value="Tender Document Vetting">Tender Document Vetting</option>
                        <option value="TCR">TCR</option>
                        <option value="DPO Vetting">DPO Vetting</option>
                        <option value="Deposit Work">Deposit Work</option>
                        <option value="CSR Cases">CSR Cases</option>
                        <option value="Girls Empowerment">Girls Empowerment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description <span class="text-red-500">*</span></label>
                    <textarea id="post-desc" required class="w-full p-2.5 border border-[#dee0e1] rounded min-h-[150px] focus:outline-blue-500"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Attach Files or Photos (Optional)</label>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="file" id="post-files" multiple accept="image/*,.pdf,.doc,.docx" class="flex-1 w-full p-2 border border-[#dee0e1] rounded text-sm bg-gray-50 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all cursor-pointer" />
                        
                        <label class="flex-none cursor-pointer bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-4 py-2.5 rounded-full flex items-center justify-center gap-2 text-sm font-semibold transition-colors shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            Take Photo
                            <input type="file" id="post-camera" accept="image/*" capture="environment" class="hidden" />
                        </label>
                    </div>
                    <div id="camera-file-name" class="text-xs text-green-600 mt-1.5 hidden font-medium"></div>
                    <p class="text-xs text-gray-500 mt-1">Supported: PDF, JPG, PNG, DOC, DOCX</p>
                </div>
                <div id="upload-progress" class="hidden text-sm text-blue-600 font-medium">Uploading files... please wait.</div>
                <div class="flex gap-3 pt-2">
                    <a href="index.html" class="px-6 py-2.5 border border-[#dee0e1] text-gray-700 rounded font-medium hover:bg-gray-50 text-center">Cancel</a>
                    <button type="submit" id="submit-post-btn" class="px-6 py-2.5 bg-blue-600 text-white rounded font-medium hover:bg-blue-700 flex-1">Post to Forum</button>
                </div>
            </form>
            <div id="post-success-msg" class="hidden mt-4 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg flex items-center gap-3 font-medium shadow-sm">
                <svg class="w-6 h-6 text-green-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                Your discussion has been posted successfully! Redirecting to feed...
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB49W61ggHHJcAJ5WyYTmX13I8NofsggSY",
            authDomain: "olympiad-portal-d2a5e.firebaseapp.com",
            projectId: "olympiad-portal-d2a5e",
            storageBucket: "olympiad-portal-d2a5e.firebasestorage.app",
            messagingSenderId: "341855557503",
            appId: "1:341855557503:web:86333350b609138cb0ec4a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-display').innerText = user.displayName || user.email;
                
                // Authorize and display Admin link
                const userDocRef = doc(db, 'forum_users', user.uid);
                getDoc(userDocRef).then(docSnap => {
                    if (docSnap.exists() && (docSnap.data().isAdmin || user.email === 'madhhu52@gmail.com')) {
                        document.getElementById('nav-admin').classList.remove('hidden');
                    }
                });
            } else {
                // Not logged in, redirect to main page to login
                window.location.href = 'signin.html';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'signin.html';
        });

        async function handleFileUploads(filesArray) {
            const urls = [];
            for (let i = 0; i < filesArray.length; i++) {
                const file = filesArray[i];
                const fileRef = ref(storage, `forum_files/${Date.now()}_${file.name}`);
                await uploadBytes(fileRef, file);
                const url = await getDownloadURL(fileRef);
                urls.push({ name: file.name, url: url });
            }
            return urls;
        }

        const createPostForm = document.getElementById('create-post-form');
        const uploadProgress = document.getElementById('upload-progress');
        const cameraInput = document.getElementById('post-camera');
        const cameraFileName = document.getElementById('camera-file-name');

        cameraInput.addEventListener('change', () => {
            if (cameraInput.files.length > 0) {
                cameraFileName.textContent = `📷 Snapshot attached: ${cameraInput.files[0].name}`;
                cameraFileName.classList.remove('hidden');
            } else {
                cameraFileName.classList.add('hidden');
            }
        });

        createPostForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            
            uploadProgress.classList.remove('hidden');
            document.getElementById('submit-post-btn').disabled = true;

            try {
                const files1 = document.getElementById('post-files').files;
                const files2 = document.getElementById('post-camera').files;
                const allFiles = [...files1, ...files2]; // Combine standard files and camera snaps
                const uploadedFiles = await handleFileUploads(allFiles);
                
                // Determine the next SL No
                let nextSlNo = 1;
                const postsQuery = query(collection(db, 'forum_posts'), orderBy('slNo', 'desc'), limit(1));
                const postsSnap = await getDocs(postsQuery);
                if (!postsSnap.empty && postsSnap.docs[0].data().slNo) {
                    nextSlNo = postsSnap.docs[0].data().slNo + 1;
                }

                await addDoc(collection(db, 'forum_posts'), {
                    title: document.getElementById('post-title').value,
                    content: document.getElementById('post-desc').value,
                    category: document.getElementById('post-category').value,
                    userId: currentUser.uid,
                    userName: currentUser.displayName || currentUser.email.split('@')[0],
                    createdAt: serverTimestamp(),
                    slNo: nextSlNo,
                    fileUrls: uploadedFiles,
                    likes: 0,
                    dislikes: 0
                });
                
                uploadProgress.classList.add('hidden');
                createPostForm.classList.add('hidden');
                document.getElementById('post-success-msg').classList.remove('hidden');
                
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch (err) {
                console.error(err);
                alert("Failed to create post: " + err.message);
                uploadProgress.classList.add('hidden');
                document.getElementById('submit-post-btn').disabled = false;
            }
        });
    </script>
</body>
</html>
