<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - USSC Finance Forum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-200 px-4 py-3 flex items-center justify-center shadow-sm">
        <div class="max-w-7xl w-full flex items-center justify-between">
            <div class="flex items-center">
                <a href="index.html" class="text-2xl font-bold text-blue-700 font-serif tracking-tight hover:opacity-80 transition-opacity">USSC Finance</a>
            </div>
            <div class="flex items-center gap-1 sm:gap-2">
                <a href="index.html" class="flex items-center gap-1.5 px-3 py-2 text-gray-600 hover:bg-gray-100 hover:text-blue-700 rounded transition-colors font-medium text-sm" title="Home">
                    <svg class="w-5 h-5 pointer-events-none" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L4 9v12h5v-7h6v7h5V9z"/></svg>
                    <span class="hidden sm:inline">Home</span>
                </a>
                <a href="post.html" class="flex items-center gap-1.5 px-3 py-2 text-gray-600 hover:bg-gray-100 hover:text-blue-700 rounded transition-colors font-medium text-sm" title="Make Post">
                    <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    <span class="hidden sm:inline">Make Post</span>
                </a>
                <a href="index.html" class="flex items-center gap-2 px-3 py-1.5 text-gray-600 hover:bg-gray-100 hover:text-blue-700 rounded-full transition-colors font-medium text-sm border border-transparent hover:border-gray-200" title="Profile">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span id="user-display" class="hidden sm:inline max-w-[120px] truncate"></span>
                </a>
                <button class="flex items-center gap-2 px-3 py-1.5 text-purple-700 bg-purple-100 rounded-full transition-colors font-medium text-sm border border-transparent" title="Admin">
                    <svg class="w-5 h-5 pointer-events-none" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                    <span class="hidden sm:inline">Admin</span>
                </button>
                <button id="logout-btn" class="text-sm px-4 py-1.5 border border-gray-300 rounded-full text-gray-500 hover:bg-gray-100 hover:text-gray-800 font-medium transition-colors">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Admin View -->
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
        <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-6">Admin Dashboard</h2>
        
        <!-- User Management -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h3 class="text-xl font-bold text-gray-800 mb-4">User Management</h3>
            <div class="flex flex-col sm:flex-row gap-4 mb-4">
                <select id="admin-user-select" class="flex-1 px-4 py-2.5 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                    <option value="">Loading users...</option>
                </select>
            </div>
            <div class="flex flex-wrap gap-3">
                <button id="admin-make-admin-btn" class="px-5 py-2 bg-purple-600 text-white rounded-lg font-semibold hover:bg-purple-700 transition-colors text-sm shadow-sm">Make Admin</button>
                <button id="admin-disable-user-btn" class="px-5 py-2 bg-orange-500 text-white rounded-lg font-semibold hover:bg-orange-600 transition-colors text-sm shadow-sm">Disable User</button>
                <button id="admin-delete-user-btn" class="px-5 py-2 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700 transition-colors text-sm shadow-sm">Delete User</button>
            </div>
            <div id="admin-user-msg" class="mt-4 text-sm font-medium"></div>
        </div>

        <!-- Post Management -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h3 class="text-xl font-bold text-gray-800 mb-4">Discussion Management</h3>
            <div class="flex flex-col sm:flex-row gap-4 mb-4">
                <select id="admin-post-select" class="flex-1 px-4 py-2.5 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                    <option value="">Loading discussions...</option>
                </select>
            </div>
            <div class="flex gap-3">
                <button id="admin-close-post-btn" class="px-5 py-2 bg-gray-600 text-white rounded-lg font-semibold hover:bg-gray-700 transition-colors text-sm shadow-sm">🔒 Close / Discontinue</button>
                <button id="admin-open-post-btn" class="px-5 py-2 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition-colors text-sm shadow-sm">🔓 Re-open</button>
            </div>
            <div id="admin-post-msg" class="mt-4 text-sm font-medium"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, updateDoc, getDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB49W61ggHHJcAJ5WyYTmX13I8NofsggSY",
            authDomain: "olympiad-portal-d2a5e.firebaseapp.com",
            projectId: "olympiad-portal-d2a5e",
            storageBucket: "olympiad-portal-d2a5e.firebasestorage.app",
            messagingSenderId: "341855557503",
            appId: "1:341855557503:web:86333350b609138cb0ec4a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // Authenticate and verify Admin Status
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDocRef = doc(db, 'forum_users', user.uid);
                const userDocSnap = await getDoc(userDocRef);
                if (!userDocSnap.exists() || (!userDocSnap.data().isAdmin && user.email !== 'madhhu52@gmail.com')) {
                    alert("You do not have Admin privileges.");
                    window.location.href = 'index.html';
                    return;
                }
                currentUser = user;
                document.getElementById('user-display').innerText = user.displayName || user.email;
                loadAdminData();
            } else {
                window.location.href = 'signin.html';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'signin.html';
        });

        async function loadAdminData() {
            const userSelect = document.getElementById('admin-user-select');
            const postSelect = document.getElementById('admin-post-select');
            try {
                const usersSnap = await getDocs(collection(db, 'forum_users'));
                userSelect.innerHTML = '<option value="">Select a user...</option>';
                usersSnap.forEach(doc => {
                    const u = doc.data();
                    if (!u.isDeleted) userSelect.innerHTML += `<option value="${doc.id}" data-email="${u.email}">${u.name} - ${u.email}${u.isDisabled ? " (Disabled)" : (u.isAdmin ? " (Admin)" : "")}</option>`;
                });
                const postsSnap = await getDocs(query(collection(db, 'forum_posts'), orderBy('createdAt', 'desc')));
                postSelect.innerHTML = '<option value="">Select a discussion...</option>';
                postsSnap.forEach(doc => {
                    const slText = doc.data().slNo ? `#${doc.data().slNo} - ` : '';
                    postSelect.innerHTML += `<option value="${doc.id}">${slText}${doc.data().title}${doc.data().isClosed ? " [CLOSED]" : ""}</option>`;
                });
            } catch (err) { console.error(err); }
        }

        function showAdminMsg(id, msg, isError = false) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = `mt-4 text-sm font-medium ${isError ? 'text-red-600' : 'text-green-600'}`;
            setTimeout(() => el.textContent = '', 4000);
        }

        // Action Listeners
        const execAction = async (btnId, msgId, action, successMsg) => {
            document.getElementById(btnId).addEventListener('click', async () => {
                const selectEl = document.getElementById(msgId === 'admin-user-msg' ? 'admin-user-select' : 'admin-post-select');
                const id = selectEl.value;
                if (!id) return showAdminMsg(msgId, 'Please make a selection first.', true);
                
                if (msgId === 'admin-user-msg') {
                    if (id === currentUser.uid) return showAdminMsg(msgId, 'You cannot perform this on yourself.', true);
                    
                    const email = selectEl.options[selectEl.selectedIndex].getAttribute('data-email');
                    if (email === 'madhhu52@gmail.com' && (btnId.includes('disable') || btnId.includes('delete'))) {
                        return showAdminMsg(msgId, 'Action denied: Super Admin cannot be disabled or deleted.', true);
                    }
                }
                
                if (btnId.includes('delete') || btnId.includes('close')) if (!confirm("Are you sure?")) return;
                await updateDoc(doc(db, msgId === 'admin-user-msg' ? 'forum_users' : 'forum_posts', id), action);
                showAdminMsg(msgId, successMsg);
                loadAdminData();
            });
        };

        execAction('admin-make-admin-btn', 'admin-user-msg', { isAdmin: true }, 'User promoted to Admin successfully.');
        execAction('admin-disable-user-btn', 'admin-user-msg', { isDisabled: true }, 'User account disabled.');
        execAction('admin-delete-user-btn', 'admin-user-msg', { isDeleted: true, isDisabled: true }, 'User permanently deleted from access.');
        execAction('admin-close-post-btn', 'admin-post-msg', { isClosed: true }, 'Discussion successfully closed.');
        execAction('admin-open-post-btn', 'admin-post-msg', { isClosed: false }, 'Discussion re-opened.');
    </script>
</body>
</html>
